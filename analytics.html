<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartbeat Zigzag Animation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    overflow:hidden;
}

/* Zigzag Line */
.zigzag{
    position:relative;
    width:300px;
    height:120px;
}

.line{
    position:absolute;
    width:100%;
    height:100%;
    fill:none;
    stroke:#00ff99;
    stroke-width:5;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:1000;
    stroke-dashoffset:1000;
    animation:draw 3s linear infinite;
    filter:drop-shadow(0 0 10px #00ff99);
}

/* Heart */
.heart{
    position:absolute;
    top:28px;
    left:130px;
    width:40px;
    height:40px;
    background:red;
    transform:rotate(-45deg);
    animation:beat 1s infinite;
    box-shadow:0 0 20px red;
}

.heart::before,
.heart::after{
    content:'';
    position:absolute;
    width:40px;
    height:40px;
    background:red;
    border-radius:50%;
}

.heart::before{
    top:-20px;
    left:0;
}

.heart::after{
    left:20px;
    top:0;
}

/* Animations */
@keyframes draw{
    0%{
        stroke-dashoffset:1000;
    }
    100%{
        stroke-dashoffset:0;
    }
}

@keyframes beat{
    0%{
        transform:rotate(-45deg) scale(1);
    }
    25%{
        transform:rotate(-45deg) scale(1.2);
    }
    50%{
        transform:rotate(-45deg) scale(1);
    }
    75%{
        transform:rotate(-45deg) scale(1.2);
    }
    100%{
        transform:rotate(-45deg) scale(1);
    }
}
</style>
</head>

<body>

<div class="zigzag">

<svg class="line" viewBox="0 0 300 120">
<path d="
M0 60 
L40 60 
L60 20 
L80 100 
L100 40 
L120 60 
L140 60 
L150 30 
L160 90 
L170 60 
L200 60 
L220 20 
L240 100 
L260 60 
L300 60"/>
</svg>

<div class="heart"></div>

</div>

</body>
</html>
