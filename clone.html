
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daraz Clone</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        /* Navbar */
        .navbar{
            background:#f85606;
            padding:15px 40px;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        .logo{
            color:white;
            font-size:32px;
            font-weight:bold;
        }

        .search-box{
            width:50%;
            display:flex;
        }

        .search-box input{
            width:100%;
            padding:12px;
            border:none;
            outline:none;
            border-radius:5px 0 0 5px;
        }

        .search-box button{
            padding:12px 20px;
            border:none;
            background:#ffe1d2;
            color:#f85606;
            font-weight:bold;
            cursor:pointer;
            border-radius:0 5px 5px 0;
        }

        .cart{
            color:white;
            font-size:24px;
        }

        /* Banner */
        .banner{
            width:100%;
            height:350px;
            background:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200') center/cover;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:45px;
            font-weight:bold;
        }

        /* Categories */
        .section-title{
            padding:25px 40px 10px;
            font-size:28px;
            color:#333;
        }

        .categories{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:20px;
            padding:20px 40px;
        }

        .category-card{
            background:white;
            padding:25px;
            border-radius:10px;
            text-align:center;
            transition:0.3s;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        .category-card:hover{
            transform:translateY(-5px);
        }

        .category-card img{
            width:80px;
            height:80px;
            object-fit:cover;
            margin-bottom:10px;
        }

        /* Products */
        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            padding:20px 40px 50px;
        }

        .product-card{
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .product-card:hover{
            transform:scale(1.03);
        }

        .product-card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .product-info{
            padding:15px;
        }

        .product-info h3{
            font-size:18px;
            margin-bottom:10px;
            color:#333;
        }

        .price{
            color:#f85606;
            font-size:22px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .buy-btn{
            width:100%;
            padding:10px;
            border:none;
            background:#f85606;
            color:white;
            font-size:16px;
            cursor:pointer;
            border-radius:5px;
        }

        .buy-btn:hover{
            background:#d94800;
        }

        /* Footer */
        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:20px;
        }

        @media(max-width:768px){
            .navbar{
                flex-direction:column;
                gap:15px;
            }

            .search-box{
                width:100%;
            }

            .banner{
                font-size:28px;
                height:250px;
                text-align:center;
                padding:20px;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">Daraz</div>

        <div class="search-box">
            <input type="text" placeholder="Search in Daraz">
            <button>Search</button>
        </div>

        <div class="cart">🛒</div>
    </div>

    <!-- Banner -->
    <div class="banner">
        Welcome To Daraz Clone
    </div>

    <!-- Categories -->
    <h2 class="section-title">Categories</h2>

    <div class="categories">
        <div class="category-card">
            <img src="https://cdn-icons-png.flaticon.com/512/1041/1041886.png">
            <h3>Fashion</h3>
        </div>

        <div class="category-card">
            <img src="https://cdn-icons-png.flaticon.com/512/3659/3659899.png">
            <h3>Electronics</h3>
        </div>

        <div class="category-card">
            <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
            <h3>Beauty</h3>
        </div>

        <div class="category-card">
            <img src="https://cdn-icons-png.flaticon.com/512/2331/2331966.png">
            <h3>Groceries</h3>
        </div>
    </div>

    <!-- Products -->
    <h2 class="section-title">Flash Sale</h2>

    <div class="products">

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=800">
            <div class="product-info">
                <h3>Nike Shoes</h3>
                <div class="price">Rs. 4,999</div>
                <button class="buy-btn">Buy Now</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=800">
            <div class="product-info">
                <h3>iPhone Mobile</h3>
                <div class="price">Rs. 149,999</div>
                <button class="buy-btn">Buy Now</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=800">
            <div class="product-info">
                <h3>T-Shirt</h3>
                <div class="price">Rs. 1,299</div>
                <button class="buy-btn">Buy Now</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=800">
            <div class="product-info">
                <h3>Headphones</h3>
                <div class="price">Rs. 3,999</div>
                <button class="buy-btn">Buy Now</button>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 MADE BY OWAIS RAO</p>
    </footer>

</body>
</html>
